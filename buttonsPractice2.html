<!DOCTYPE html>
<html>
  <head>

  </head>
  <body>

<style>
.btn-request {
    padding: 10px 15px;
    color: white;
    background-color: black;
    margin: 5px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

.btn-request:hover {
    opacity: 0.7;
}

.btn-request:active {
  opacity: 0.5;
}


.btn-add {
  padding: 12px 40px;
  background-color: rgb(255, 216, 20);
  border: none;
  border-radius: 15px;
  margin: 5px;
  cursor: pointer;
  transition: filter 0.15s, opacity 0.15s;
}

.btn-add:hover {
  filter: brightness(0.90);
}

.btn-add:active {
  opacity: 0.5;
}

.btn-sign {
  color: white;
  background-color: rgb(46, 164, 79);
  border: none;
  padding: 12px 15px;
  border-radius: 4px;
  cursor: pointer;
  transition: box-shadow 0.15s, opacity 0.15s;
  
}

.btn-sign:hover {
  box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.15);
}

.btn-sign:active {
  opacity: 0.7;
}

.btn-started {
  color: white;
  background-color: rgb(121, 82, 179);
  border: none;
  margin: 5px;
  padding: 10px 15px;
  border-radius: 3px;
  cursor: pointer;
  transition: filter 0.15s, opacity 0.15s;
}

.btn-started:hover {
  filter: brightness(0.90);
}

.btn-started:active {
  opacity: 0.7;
}

.btn-download {
  background-color: white;
  margin-left: 5;
  margin: 5px;
  padding: 10px 17px;
  border-style: solid;
  border-width: 1px;
  border-radius: 3px;
  cursor: pointer;
  transition: background-color 0.15s, color 0.15s, opacity 0.15s;
}

.btn-download:hover {
  background-color: grey;
  color: white;
}

.btn-download:active {
  opacity: 0.7;
}

.btn-apply {
  padding: 8px 15px;
  background-color: rgb(10, 102, 194);
  border: none;
  color: white;
  border-radius: 18px;
  cursor: pointer;
  margin: 5px;
  margin-right : 5px;
  transition: background-color 0.15s, opacity 0.15s;
}

.btn-apply:hover {
  background-color: rgb(7, 21, 90);
}

.btn-apply:active {
  opacity: 0.7;
}

.btn-save {
  padding: 8px 15px;
  border-radius: 18px;
  border-width: 1px;
  border-style: solid;
  border-color: rgb(0, 68, 255);
  cursor: pointer;
  background-color: white;
  transition: background-color 0.15s, opacity 0.15s;
}

.btn-save:hover {
  background-color:  rgb(0, 166, 255);
}

.btn-save:active {
  opacity: 0.7;
}

</style>

<button class="btn-request">
  Request now
</button>

<button class="btn-add">
  Add to Cart
</button>

<button class="btn-sign">
  Sign up
</button>

<p></p>

<button class="btn-started">
  Get started
</button>

<button class="btn-download">
   Download
</button>

<p></p>

<button class="btn-apply">
Apply on company website
</button>

<button class="btn-save">
  Save
</button>
  </body>
</html>
