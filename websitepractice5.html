<!DOCTYPE html>
<html>
<head></head>
<body>
  <style>
.strech {
  background-color: rgb(6, 142, 6);
  color: white;
  padding: 8px 15px;
  font: bold;
  border: none;
  transition: padding 0.55s;  
}
.strech:hover {
  padding: 16px 32px;  
}

.shadow {
    background-color: rgb(6, 142, 6);
    color: white;
    border: none;
    padding: 5px 10px;
    transition: box-shadow 0.15s,
    transform 0.15s;
}
.shadow:hover {
  box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.4)
}
.shadow:active {
  transform: translate(3px, 3px);
  box-shadow: 0px 0px;
  border: 2px black;
}
.one {
    background-color: rgb(6, 142, 6);
    color: white;
    border:none;
    padding: 5px 15px;
    transition: padding-right 0.3s,
    padding-left 0.3s,
    margin-left 0.3s,
    margin-right 0.3s;
    margin-left:5px;
    margin-right:5px; 
}
.one:hover {
    margin-left:0px;
    margin-right:0px; 
  padding-left: 20px;
  padding-right: 20px;

}

.two {
    background-color: rgb(6, 142, 6);
    color: white;
    border: none;
      padding: 5px 15px;
    transition: padding 0.3s, margin 0.3s;
margin: 0px 5px;
}
.two:hover {
  padding: 5px 20px;
  margin: 0px 0px;
}

.three {
    background-color: rgb(6, 142, 6);
    color: white;
    border: none;
      padding: 5px 15px;
    transition: padding 0.3s, margin 0.3s;
    margin: 0px 5px;
}
.three:hover {
  padding: 5px 20px;
  margin: 0px 0px;
}

</style>

<button class="strech">Strech</button>
<p></p>
<button class="shadow">Shadow</button>
<p></p>
<button class="one">One</button>
<button class="two">Two</button>
<button class="three">Three</button>
</body>
</html>
