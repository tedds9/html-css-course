<!DOCTYPE html>
<html>
<head>
  <style>
    .body {
      margin: 0;
    }
    .con-search {
      font-family: Arial;
      background-color: rgba(128, 0, 128, 0.59);
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      height: 50px;
      margin-bottom: 50px;
      color: white;
      align-items: center;
    }
    .home{
      justify-content: center;
      width: 70px;
      font-weight: bold;
      display: flex;
      font-size: 14px;
      margin-right: 70px;
    }
    .search-box {
      justify-content: center;
      display: flex;
      flex: 1;
    }
    .search {
      width: 100%;
      max-width: 100%;
      flex: 1;
      height: 25px;
      border-radius: 20px;
      border: none;
      padding-left: 15px;
    }
    .download {
      display: flex;
      justify-content: center;
      width: 100px;
      margin-left: 70px;
    }
    
    
    .con1 {
      font-family: Arial;
      gap: 10px;
      display: grid;
    }
    .person1 {
      display: grid;
      grid-template-columns: 70px 200px 70px;
      align-items: center;
    }
    .profile-picture {
      display: flex;
      justify-content: center;
    }
    .picture {
      border-radius: 50px;
      width: 50px;
      height: 50px;
    }
    .profile-info {
      display: grid;
      grid-template-rows: 20px 20px 20px;
      font-size: 14px;
    }
    .title {
      font-weight: bold;
    }
    .info1 {
      color: grey;
    }
    .info2 {
      color: grey;
    }
    .follow-button {
      justify-content: center;
      display: flex;
      background-color: blue;
      padding: 6px 8px;
      color: white;
    }
  </style>
</head>
<body class="body">
  <div class="con-search">
    <div class="home">
      Home
    </div>
    <div class="search-box">
      <input class="search" type="text" placeholder="Search">
    </div>
    <div class="download">
      Download
    </div>
  </div>
  <div class="con1">
    <div class="person1">
      <div class="profile-picture">
        <img class="picture" src="../thumbnail/images.jfif">
      </div>
      <div class="profile-info">
        <span class="title">
          oliver
        </span>
        <span class="info1">
          the cat
        </span>
        <span class="info2">
          Popular
        </span>
      </div>
      <div class="follow-button">
        Follow
      </div>
    </div>
    <div class="person1">
      <div class="profile-picture">
        <img class="picture" src="../thumbnail/ya8qikz9kn0f1.png">
      </div>
      <div class="profile-info">
        <span class="title">
          rizzler
        </span>
        <span class="info1">
          that dude
        </span>
        <span class="info2">
          skibidibapbap
        </span>
      </div>
      <div class="follow-button">
        Follow
      </div>
    </div>
    <div class="person1">
      <div class="profile-picture">
        <img class="picture" src="../thumbnail/catmeme1.webp">
      </div>
      <div class="profile-info">
        <span class="title">
          mike
        </span>
        <span class="info1">
          heelo
        </span>
        <span class="info2">
          caller
        </span>
      </div>
      <div class="follow-button">
        Follow
      </div>
    </div>
    
  </div>

</body>
</html>
