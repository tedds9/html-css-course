<!DOCTYPE html>
<html>
<head>
  <title>New Tab</title>
  <style>
    .content {
      width: 1350px;
      text-align: center;
      margin-top: 140px;
    }
    .goggle {
      width: 350px;
      height: 150px;
      object-fit: cover;
      margin-bottom: 30px;

    }
    .search {
      margin-left: 320px;
      margin-bottom: 25px;
      padding: 16px;
      padding-right: 400px;
      width: 300px;
      display: block;
      border-radius: 20px;
      border: none;
      box-shadow: 0px 0px 5px rgba(0,0,0,0.4);
      font-size: 16px;
    }
    .text1 {
      margin-left: 0px;
      margin-right: 15px;
      border: none;
      filter: brightness(0.99);
      padding: 14px 40px;
    }
    .text2 {

      border: none;
      filter: brightness(0.95);
      padding: 14px 40px;
    }
  </style>
</head>
<body>
  <div class="content">
    <img class="goggle" src="../coursepractice/picture/Google-Logo.wine.png">
    <input class="search" type="text" placeholder="Search Google or type a URL">
    <button class="text1">Goggle Search</button>
    <button class="text2">I'm Feeling Lucky</button>
  
  </div>

</body>
</html>
