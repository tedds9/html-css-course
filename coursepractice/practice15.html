<!DOCTYPE html>
<html>
<head>
  <style>
    .profile {
      
      display: inline-block;
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 50px;
      margin-bottom: 0px;
      margin-left: 5px;
      margin-right: 8px;
    
    }
    .con1 {

      height: 86px;
      align-items: center;
      display:  flex;
      margin-bottom: 5px;
    }
    .box1 {
      display:inline-block;
    }

      display: inline-block;
      width: 150px;
      margin-left: 5px;

    .box3 {
      display: inline-block;
      

    }
    .name {
      font-family: Arial;
      display: inline-block;
      margin-bottom: 0px;
      margin-top: 0px;

    
    }
    .cat {
      margin-top: 5px;

      margin-bottom: 0px;
      color: grey;
      margin-bottom:0px;
    }
    .pop {

      font-family: Arial;
      margin-bottom: 0px;
      color: grey;
    }
    .follow {
      color: white;
      background-color: rgb(0, 81, 255);
      border: none;
      height: 30px;
      padding: 8px 10px;
      border-radius: 5px;
      
    }
    .addlist1 {
      margin-top: 50px;
      display: flex;
      gap: 20px;
      margin-bottom: 100px;
    }
    
    .profile1 {
      width: 225px;
      box-shadow: 0px 0px 5px rgba(0,0,0,0.4);
      
    }
    .pic1 {
      width: 225px;
      height: 225px;
    }
    .pic-img1 {
      width: 225px;
      height: 225px;
      object-fit: cover;
    }
    .mutualpic1 {
        width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      
      transform: scale(1.5);
      
    }
    .mutual1-con {
      margin-left: 10px;
      width: 35px;
      height: 35px;
      overflow: hidden;
      border-radius: 50px;
    }
    .mutual1 {
      
      display: flex;
      align-items: center;
      justify-content: left;
      gap: 5px;
      
    }
    .name1 {
      font-family: Arial;
      font-weight: bold;
      margin: 8px;
    }
    .mutualfriend1 {
      margin-left: 5px;
      font-family: Arial;
      color: grey;
    }
    .add1 {
      font-family: Arial;
      margin-left: 10px;
      color: white;
      background-color: rgb(0, 76, 255);
      display: inline-block;
      margin-top: 8px;
      padding: 8px 18px;
      border-radius: 4px;
      margin-bottom: 10px;
    }
  </style>
