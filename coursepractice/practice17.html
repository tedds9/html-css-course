<!DOCTYPE html>
<html>
<head>
  <style>
    .con1 {
      display: flex;
      flex-direction: row;
      margin-bottom: 50px;
    }
    .box1 {
      background-color: blue;
      width: 200px;
    }
    .box2 {
      background-color: pink;
      width: 75px;
    }

    .con2 {
      display: flex;
      flex-direction: row;
      margin-bottom: 50px;
    }
    .item1 {
      background-color: blue;
      width: 50px;
    }
    .item2 {
      background-color: pink;
       flex: 1;
  
    }
    .item3 {
      background-color: blue;
      width: 75px;
    }

    .con3 {
      display: flex;
      flex-direction: row;
      margin-bottom:50px;
      justify-content: space-between;
    }
    .box-1 {
      background-color: pink;
    }
    .box-2 {
      background-color: pink;
    }
    .box-3 {
      background-color: pink;
    }
    .box-4 {
      background-color: pink;
    }

    .con4 {
      display: flex;
      flex-direction: row;
      margin-bottom: 50px;
      border-color: black;
      border: solid;
      border-width: 1px;
      height: 50px;
      justify-content: space-between;
      align-items: center;
      
    }
    .leftbox {
      background-color: pink;
    }
    .rightbox {
      background-color: pink;
    }
  </style>
</head>
<body>
  <div class="con1">
    <div class="box1">
      200px
    </div>
    <div class="box2">
      75px
    </div>
  </div>

  <div class="con2">
    <div class="item1">
      item1
    </div>
    <div class="item2">
      item2
    </div>
    <div class="item3">
      item3
    </div>
  </div>

  <div class="con3">

    <div class="box-1">
      item1
    </div>
    <div class="box-2">
      item2
    </div>
    <div class="box-3">
      item3
    </div>
    <div class="box-4">
      item4
    </div>
  </div>

  <div class="con4">
    <div class="leftbox">
      item1
    </div>
    <div class="rightbox">
      item2
    </div>
  </div>
</body>
</html>
