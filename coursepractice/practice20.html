<!DOCTYPE html>
<html>
<head>
  <style>
    .con1 {
      display: flex;
      flex-direction: row;
      width: 300px;
      height: 50px;
      margin-bottom: 50px;
    }
    .left-box {
      background-color: pink;
      flex: 1;
      justify-content: center;
      align-items: center;
      display: flex;


    }
    .right-box{
      background-color: blue;
      flex: 2;
      justify-content: center;
      align-items: center;
      display: flex;
    }
    .item1 {
      background-color: black;
      color: white;
    }
    .item2 {
      background-color: black;
      display: flex;
      color: white;
    }
    .con2 {
      display: flex;
      flex-direction: row;
      width: 300px;
      height: 50px;
    }
    .left-box2 {
      flex: 1;
      background-color: pink;
      align-items: center;
      justify-content:center;
    }
    .left-left-box2 {
      display: flex;

    
    }
    .right-box2 {
      flex: 2;
      background-color: blue;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
    }
    .right-left-box {
      display: flex;
      flex-direction: column;
    }
    .row1 {

    }
    .row2 {
      background-color: black;
      color: white;
    }
    .right-right-box {
      display: flex;
      align-items: center;
    }
    .second-row2 {
      background-color: black; 
      color: white;
    }
  </style>
</head>
<body>
  <div class="con1">
    <div class="left-box">
      <span class="item1">item1</span>
    </div>
    <div class="right-box">
      <span class="item2">item2</span>  
    </div>
  </div>
  <div class="con2">
    <div class="left-box2">
      <span class="left-left-box2"></span>
      left-box
    </div>
    <div class="right-box2">
      <div class="right-left-box">
        <span class="row1">
          row1
        </span>
        <span  class="row2">
          row2
        </span>
      </div>
      <div class="right-right-box">
        <span class="second-row2">
          row2
        </span>
      </div>
    </div>
  </div>
</body>
</html>
