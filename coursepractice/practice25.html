<!DOCTYPE html>
<html>

<head>
  <style>
    .body {
      margin: 0px;
      height: 500px;
    }

    .head1 {
    }
    .con1 {
      
      font-family: Arial;
      position: fixed;
      top: 0px;
      left: 0px;
      right: 0px;
      height: 50px;
      background-color: white;
      display: flex;
      width: 100%;
      height: 100%;
      flex-direction: row;
      justify-content: center;
    }
    .con-box {
      width: 80%;
      height: 50px;
      display: flex;
      flex-direction: row;

    }
    .con-name {
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 5px;
    }
    .con-img {

    }
    .picture {
      width: 35px;
      height: 35px;
      border-radius: 50%;
    }
    .image-name {
      font-weight: bold;
    }
    .con-add {
      flex: 1;
      display: flex;
      flex-direction: row;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }
    .button-add {
      background-color: rgba(0, 0, 162, 0.616);
      color: white;
      padding: 6px 6px;
      border-radius: 5px;
    }
    .message-add {
      background-color: rgba(128, 128, 128, 0.282);
      color: black;
      padding: 6px 6px;
      border-radius :5px;
    }

  </style>
</head>

<body class="body">
  <div class="head1">
      <div class="con1">
        <div class="con-box">
          <div class="con-name">
            <div class="con-img">
              <img class="picture" src="../thumbnail/images.jfif">
            </div>
            <div class="image-name">
              Oliver Cat
            </div>
          </div>
          <div class="con-add">
            <div class="button-add">
              Add Friend
            </div>
            <div class="message-add">
              Message
            </div>
          </div>
        </div>
      </div>
  </div>

</body>

</html>
